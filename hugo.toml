[module]
  [[module.imports]]
    path = "github.com/wowchemy/wowchemy-hugo-modules/wowchemy/v5"

[build]
  writeStats = true

baseURL = 'https://weiwei-mao.github.io/website/'
languageCode = 'en-us'
title = 'Wei Mao - Hydrology Researcher'

[params]
  name = "Wei Mao"
  description = "Academic website of Wei Mao - Hydrology Researcher at Florida State University"
  email = "your-email@example.com"
  timezone = "America/New_York"
  github = "Weiwei-Mao"

[params.author]
  name = "Wei Mao"
  bio = "Hydrology Researcher"
  location = "Tallahassee, FL"

[markup]
  [markup.markdown]
    style = 'markdown'

[outputs]
  home = ["HTML", "RSS"]